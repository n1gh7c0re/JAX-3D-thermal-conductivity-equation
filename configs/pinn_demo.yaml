# Облегченная конфигурация для быстрой демонстрации PINN
domain:
  Lx: 1.0
  Ly: 1.0
  Lz: 1.0
  alpha: 1.0
  T: 0.1

network:
  layers: [4, 96, 96, 96, 96, 96, 1] # 5 скрытых слоев по 96 нейронов
  activation: "tanh"

training:
  epochs: 50  # Вместо 8000. Пролетит за пару секунд.
  optimizer: "Adam"
  learning_rate:
    initial: 0.001
    decay_steps: 50
    end_learning_rate: 0.0001
  loss_weights:
    pde: 1.0
    bc: 10.0
    ic: 10.0

sampling:
  n_collocation: 1000  # Вместо 12000
  n_boundary: 200      # Вместо 2000
  n_initial: 200       # Вместо 2000

evaluation:
  eval_grid_size: 21 # 21x21x21 из-за ограничений памяти
  eval_times: [0.0, 0.02, 0.05, 0.1]

runtime:
  output_dir: "results/pinn_demo"
  print_every: 10
  seed: 42
